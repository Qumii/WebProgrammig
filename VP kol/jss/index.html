<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ay Bulma</title>
</head>
<body>
    <script>
        function ayiTap(rəqəm) {
            switch(rəqəm) {
                case 1:
                    console.log("Yanvar");
                    break;
                case 2:
                    console.log("Fevral");
                    break;
                case 3:
                    console.log("Mart");
                    break;
                case 4:
                    console.log("Aprel");
                    break;
                case 5:
                    console.log("May");
                    break;
                case 6:
                    console.log("İyun");
                    break;
                case 7:
                    console.log("İyul");
                    break;
                case 8:
                    console.log("Avqust");
                    break;
                case 9:
                    console.log("Sentyabr");
                    break;
                case 10:
                    console.log("Oktyabr");
                    break;
                case 11:
                    console.log("Noyabr");
                    break;
                case 12:
                    console.log("Dekabr");
                    break;
                default:
                    console.log("Düzgün rəqəm daxil edin.");
            }
        }

        // Klaviaturadan rəqəm daxil edərək ayı tapmaq üçün funksiyaya dəyər ötürün.
        var rəqəm = parseInt(prompt("Bir rəqəm daxil edin (1-12):"));
        ayiTap(rəqəm);
    </script>
</body>
</html>
